# Render Blueprint — deploy frontend + RAG API together
# After pushing to GitHub: https://dashboard.render.com/blueprints → New Blueprint Instance

services:
  # ── Backend: RAG + LLM API ──────────────────────────────────────────────
  - type: web
    name: architecture-playground-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --include=dev
    startCommand: npm run start:server
    healthCheckPath: /api/rag/status
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.11.0
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: OPENAI_API_KEY
        sync: false

  # ── Frontend: React static site ───────────────────────────────────────────
  - type: web
    name: architecture-playground-ui
    runtime: static
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: VITE_RAG_API_URL
        fromService:
          type: web
          name: architecture-playground-api
          envVarKey: RENDER_EXTERNAL_URL
